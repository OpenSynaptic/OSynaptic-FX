name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Platform: ARM Cortex-M0+ ────────────────────────────────────────────
  arm-cm0-package:
    name: Build (arm-cm0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
      - name: Build libosfx_arm_cm0.a
        run: |
          mkdir -p build-arm-cm0/obj
          for c in src/*.c; do
            arm-none-eabi-gcc -mcpu=cortex-m0plus -mthumb \
              -std=c99 -Os -ffreestanding -Iinclude \
              -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 \
              -c "$c" -o "build-arm-cm0/obj/$(basename "${c%.c}").o"
          done
          arm-none-eabi-ar rcs libosfx_arm_cm0.a build-arm-cm0/obj/*.o
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-arm-cm0
          path: libosfx_arm_cm0.a

  # ─── Platform: ARM Cortex-M3 ──────────────────────────────────────────────
  arm-cm3-package:
    name: Build (arm-cm3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
      - name: Build libosfx_arm_cm3.a
        run: |
          mkdir -p build-arm-cm3/obj
          for c in src/*.c; do
            arm-none-eabi-gcc -mcpu=cortex-m3 -mthumb \
              -std=c99 -Os -ffreestanding -Iinclude \
              -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 \
              -c "$c" -o "build-arm-cm3/obj/$(basename "${c%.c}").o"
          done
          arm-none-eabi-ar rcs libosfx_arm_cm3.a build-arm-cm3/obj/*.o
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-arm-cm3
          path: libosfx_arm_cm3.a

  # ─── Platform: ARM Cortex-M4 ──────────────────────────────────────────────
  arm-cm4-package:
    name: Build (arm-cm4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
      - name: Build libosfx_arm_cm4.a
        run: |
          mkdir -p build-arm-cm4/obj
          for c in src/*.c; do
            arm-none-eabi-gcc -mcpu=cortex-m4 -mthumb -mfpu=fpv4-sp-d16 -mfloat-abi=hard \
              -std=c99 -Os -ffreestanding -Iinclude \
              -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 \
              -c "$c" -o "build-arm-cm4/obj/$(basename "${c%.c}").o"
          done
          arm-none-eabi-ar rcs libosfx_arm_cm4.a build-arm-cm4/obj/*.o
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-arm-cm4
          path: libosfx_arm_cm4.a

  # ─── Platform: ARM Cortex-M7 ──────────────────────────────────────────────
  arm-cm7-package:
    name: Build (arm-cm7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
      - name: Build libosfx_arm_cm7.a
        run: |
          mkdir -p build-arm-cm7/obj
          for c in src/*.c; do
            arm-none-eabi-gcc -mcpu=cortex-m7 -mthumb -mfpu=fpv5-d16 -mfloat-abi=hard \
              -std=c99 -Os -ffreestanding -Iinclude \
              -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 \
              -c "$c" -o "build-arm-cm7/obj/$(basename "${c%.c}").o"
          done
          arm-none-eabi-ar rcs libosfx_arm_cm7.a build-arm-cm7/obj/*.o
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-arm-cm7
          path: libosfx_arm_cm7.a

  # ─── Platform: ARM Cortex-M33 ─────────────────────────────────────────────
  arm-cm33-package:
    name: Build (arm-cm33)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
      - name: Build libosfx_arm_cm33.a
        run: |
          mkdir -p build-arm-cm33/obj
          for c in src/*.c; do
            arm-none-eabi-gcc -mcpu=cortex-m33 -mthumb -mfpu=fpv5-sp-d16 -mfloat-abi=hard \
              -std=c99 -Os -ffreestanding -Iinclude \
              -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 \
              -c "$c" -o "build-arm-cm33/obj/$(basename "${c%.c}").o"
          done
          arm-none-eabi-ar rcs libosfx_arm_cm33.a build-arm-cm33/obj/*.o
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-arm-cm33
          path: libosfx_arm_cm33.a

  # ─── Platform: RISC-V rv32imc ─────────────────────────────────────────────
  riscv-package:
    name: Build (riscv)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install RISC-V toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf picolibc-riscv64-unknown-elf
      - name: Build libosfx_riscv.a
        run: |
          mkdir -p build-riscv/obj
          # gcc's own built-ins (stddef.h, stdarg.h, stdbool.h ...)
          GCC_INC=$(riscv64-unknown-elf-gcc -march=rv32imc -mabi=ilp32 -print-file-name=include)
          # picolibc headers installed by picolibc-riscv64-unknown-elf
          PICOLIBC_INC=$(find /usr/lib/picolibc/riscv64-unknown-elf -name 'stdint.h' 2>/dev/null | head -1 | xargs dirname)
          for c in src/*.c; do
            riscv64-unknown-elf-gcc -march=rv32imc -mabi=ilp32 \
              -std=c99 -Os -ffreestanding -nostdinc \
              -isystem "$GCC_INC" \
              -isystem "$PICOLIBC_INC" \
              -Iinclude \
              -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 \
              -c "$c" -o "build-riscv/obj/$(basename "${c%.c}").o"
          done
          riscv64-unknown-elf-ar rcs libosfx_riscv.a build-riscv/obj/*.o
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-riscv
          path: libosfx_riscv.a

  # ─── Platform: Xtensa / ESP32 ─────────────────────────────────────────────
  xtensa-package:
    name: Build (xtensa/esp32)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.2
    steps:
      - uses: actions/checkout@v4
      - name: Build libosfx_xtensa.a
        shell: bash
        run: |
          source /opt/esp/idf/export.sh
          mkdir -p build-xtensa/obj
          for c in src/*.c; do
            xtensa-esp32-elf-gcc -std=c99 -Os -Iinclude \
              -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 \
              -c "$c" -o "build-xtensa/obj/$(basename "${c%.c}").o"
          done
          xtensa-esp32-elf-ar rcs libosfx_xtensa.a build-xtensa/obj/*.o
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-xtensa
          path: libosfx_xtensa.a

  # ─── Platform: AVR small (ATmega328P, ≤64 KB Flash) ───────────────────────
  avr-small-package:
    name: Build (avr-small / atmega328p)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install AVR toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc-avr binutils-avr avr-libc
      - name: Build libosfx_avr_small.a
        run: |
          mkdir -p build-avr-small/obj
          AVR_EXCLUDE="osfx_glue.c|osfx_platform_runtime.c|osfx_service_runtime.c\
            |osfx_cli_lite.c|osfx_storage.c|osfx_storage_littlefs.c\
            |osfx_library_catalog.c|osfx_secure_session.c\
            |osfx_payload_crypto.c|osfx_plugin_port_forwarder.c"
          for c in src/*.c; do
            fname="$(basename "$c")"
            echo "$AVR_EXCLUDE" | tr '|' '\n' | grep -qx "$fname" && continue
            avr-gcc -mmcu=atmega328p -std=c99 -Os -Iinclude \
              -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 \
              -c "$c" -o "build-avr-small/obj/$(basename "${c%.c}").o"
          done
          avr-ar rcs libosfx_avr_small.a build-avr-small/obj/*.o
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-avr-small
          path: libosfx_avr_small.a

  # ─── Platform: AVR large (ATmega2560, ≥128 KB Flash) ──────────────────────
  avr-large-package:
    name: Build (avr-large / atmega2560)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install AVR toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc-avr binutils-avr avr-libc
      - name: Build libosfx_avr_large.a
        run: |
          mkdir -p build-avr-large/obj
          AVR_EXCLUDE="osfx_glue.c|osfx_platform_runtime.c|osfx_service_runtime.c\
            |osfx_cli_lite.c|osfx_storage.c|osfx_storage_littlefs.c\
            |osfx_library_catalog.c|osfx_secure_session.c\
            |osfx_payload_crypto.c|osfx_plugin_port_forwarder.c"
          for c in src/*.c; do
            fname="$(basename "$c")"
            echo "$AVR_EXCLUDE" | tr '|' '\n' | grep -qx "$fname" && continue
            avr-gcc -mmcu=atmega2560 -std=c99 -Os -Iinclude \
              -DOSFX_ENABLE_FILE_IO=0 -DOSFX_ENABLE_CLI=0 \
              -c "$c" -o "build-avr-large/obj/$(basename "${c%.c}").o"
          done
          avr-ar rcs libosfx_avr_large.a build-avr-large/obj/*.o
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-avr-large
          path: libosfx_avr_large.a

  # ─── Platform: Linux x86_64 ───────────────────────────────────────────────
  linux-x86_64-package:
    name: Build (linux-x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build libosfx_x86_64_linux.a
        run: |
          mkdir -p build-linux/obj
          for c in src/*.c; do
            gcc -m64 -std=c99 -O2 -Iinclude \
              -c "$c" -o "build-linux/obj/$(basename "${c%.c}").o"
          done
          ar rcs libosfx_x86_64_linux.a build-linux/obj/*.o
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-x86_64
          path: libosfx_x86_64_linux.a

  # ─── Platform: Windows x86_64 (MinGW cross-compile) ──────────────────────
  windows-x86_64-package:
    name: Build (windows-x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW-w64
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64
      - name: Build libosfx_x86_64_windows.lib
        run: |
          mkdir -p build-windows/obj
          for c in src/*.c; do
            x86_64-w64-mingw32-gcc -m64 -std=c99 -O2 -Iinclude \
              -c "$c" -o "build-windows/obj/$(basename "${c%.c}").o"
          done
          x86_64-w64-mingw32-ar rcs libosfx_x86_64_windows.lib build-windows/obj/*.o
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-x86_64
          path: libosfx_x86_64_windows.lib

  # ─── Platform: macOS x86_64 ───────────────────────────────────────────────
  macos-x86_64-package:
    name: Build (macos-x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build libosfx_x86_64_macos.a
        run: |
          mkdir -p build-macos/obj
          for c in src/*.c; do
            clang -arch x86_64 -std=c99 -O2 -Iinclude \
              -c "$c" -o "build-macos/obj/$(basename "${c%.c}").o"
          done
          libtool -static -o libosfx_x86_64_macos.a build-macos/obj/*.o
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-x86_64
          path: libosfx_x86_64_macos.a

  # ─── Publish GitHub Release ───────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs:
      - arm-cm0-package
      - arm-cm3-package
      - arm-cm4-package
      - arm-cm7-package
      - arm-cm33-package
      - riscv-package
      - xtensa-package
      - avr-small-package
      - avr-large-package
      - linux-x86_64-package
      - windows-x86_64-package
      - macos-x86_64-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      # ── Assemble Arduino-compliant library ZIP ──────────────────────────────
      # Arduino Library Manager spec:
      #   • ZIP name    : {name}-{version}.zip  (name = library.properties name)
      #   • Root folder : {name}  (must match exactly)
      #   • Precompiled : src/{build.mcu}/libOSynapticFX.a
      - name: Assemble Arduino library ZIP
        shell: bash
        run: |
          VER="${{ env.RELEASE_TAG }}"
          VER="${VER#v}"

          # Read canonical library name from library.properties (Arduino spec: ZIP name == library name)
          LIB=$(grep -m1 '^name=' library.properties | cut -d= -f2- | tr -d '[:space:]')
          ZIP="${LIB}-${VER}.zip"
          PKG="${LIB}"

          # --- metadata (patch version in library.properties to match release tag) ---
          mkdir -p "${PKG}"
          sed "s/^version=.*/version=${VER}/" library.properties > "${PKG}/library.properties"
          cp README.md LICENSE keywords.txt "${PKG}/"

          # --- headers (include/) + examples ---
          cp -r include examples "${PKG}/"

          # --- C source files (flat src/*.{c,h} only, no subdirs) ---
          mkdir -p "${PKG}/src"
          find src -maxdepth 1 \( -name "*.c" -o -name "*.h" \) -exec cp {} "${PKG}/src/" \;

          # --- precompiled: src/{build.mcu}/libOSynapticFX.a ---
          install_lib() {
            local artifact="$1" arch="$2"
            local f
            f=$(find "dist/${artifact}" -name "*.a" 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              mkdir -p "${PKG}/src/${arch}"
              cp "$f" "${PKG}/src/${arch}/libOSynapticFX.a"
              echo "  [arduino] src/${arch}/libOSynapticFX.a  ($(wc -c < "$f") bytes)"
            else
              echo "  [skip]   dist/${artifact} — no .a found"
            fi
          }

          install_lib pkg-arm-cm0    cortex-m0plus
          install_lib pkg-arm-cm3    cortex-m3
          install_lib pkg-arm-cm4    cortex-m4
          install_lib pkg-arm-cm7    cortex-m7
          install_lib pkg-arm-cm33   cortex-m33
          install_lib pkg-riscv      riscv32
          install_lib pkg-xtensa     esp32
          install_lib pkg-avr-small  atmega328p
          install_lib pkg-avr-large  atmega2560

          # --- create ZIP ---
          zip -r "${ZIP}" "${PKG}"
          echo "ZIP_NAME=${ZIP}" >> "$GITHUB_ENV"
          echo ""
          echo "=== Arduino ZIP: ${ZIP}  ($(wc -c < "${ZIP}") bytes) ==="
          unzip -l "${ZIP}" | grep "libOSynapticFX"

      # ── Rename standalone (non-Arduino) platform binaries ──────────────────
      - name: Rename standalone platform binaries
        shell: bash
        run: |
          rename_lib() {
            local artifact="$1" dest="$2"
            local f
            f=$(find "dist/${artifact}" -type f \( -name "*.a" -o -name "*.lib" \) 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              cp "$f" "$dest"
              echo "  [standalone] $dest"
            fi
          }
          rename_lib pkg-linux-x86_64    libosfx_x86_64_linux.a
          rename_lib pkg-windows-x86_64  libosfx_x86_64_windows.lib
          rename_lib pkg-macos-x86_64    libosfx_x86_64_macos.a

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "OSynaptic-FX ${{ env.RELEASE_TAG }}"
          body_path: RELEASE_NOTES_v1.0.0.md
          files: |
            ${{ env.ZIP_NAME }}
            libosfx_x86_64_linux.a
            libosfx_x86_64_windows.lib
            libosfx_x86_64_macos.a
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-rc') || contains(env.RELEASE_TAG, '-beta') || contains(env.RELEASE_TAG, '-alpha') }}
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
